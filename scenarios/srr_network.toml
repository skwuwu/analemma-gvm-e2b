# SRR network rules for e2b demo.

[[rules]]
method   = "GET"
pattern  = "api.stripe.com/{any}"
decision = { type = "Allow" }
description = "Allow Stripe read operations (GET)"

[[rules]]
method   = "POST"
pattern  = "api.bank.com/transfer{any}"
decision = { type = "Deny", reason = "Wire transfer blocked — requires manual approval" }
description = "Block bank wire transfers"

[[rules]]
method   = "GET"
pattern  = "169.254.169.254/{any}"
decision = { type = "Deny", reason = "SSRF: cloud metadata blocked" }
description = "Block cloud metadata endpoint"
